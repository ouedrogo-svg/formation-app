services:
  - type: web
    name: elearning-web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn elearning.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "elearning-web.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://elearning-web.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: elearning-db
          property: connectionString

databases:
  - name: elearning-db
    plan: free
